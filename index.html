    * {

      box-sizing: border-box;

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;

    .card {

  }

    }

    .links {

      flex-direction: column;

    }

    .link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid #30363d;;

      text-decoration: none;
      color: #e6edf3;
      background: #21262d;
      font-size: 14px;
      transition: background 0.15s;
    }

    .link:hover {

    }

    .link svg {
